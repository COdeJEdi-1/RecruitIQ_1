    leadership_skills: []
  mid:
    label: Executive / Assistant Manager
    years: 2-5
    seniority_tag: Mid
    core_skills:
    - End-to-end monthly payroll processing per Minimum Wages Act
    - 'Statutory deductions: ESI, EPF — timely submissions and record maintenance'
    - Source and recruit skilled/unskilled workers via employment exchanges and local
      networks
    - Conduct interviews and skill assessments (stitching, finishing)
    - Support labour inspections and statutory audits
    - Maintain compliance with Factories Act 1948, Minimum Wages Act, Payment of Wages
      Act, ESI Act, EPF Act
