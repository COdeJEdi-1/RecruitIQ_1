department: Hr
division: Arvind Limited — Garment Factory HR
company: Arvind Limited
experience_bands:
  junior:
    label: Junior / Trainee
    years: 0-2
    seniority_tag: Junior
    core_skills:
    - 'Maintain statutory worker welfare facilities: canteen, first aid, crèche, sanitation'
    - Organize health check-ups, safety training, hygiene awareness programs
    - Process attendance, overtime, and leave for wage calculation
    - Handle worker grievances and mediate disputes
    progressive_skills: []
    arvind_specific:
