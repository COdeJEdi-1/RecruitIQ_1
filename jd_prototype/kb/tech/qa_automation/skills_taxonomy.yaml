role_family: QA Automation / SDET
department: Tech

core_skills:
  - Test automation framework design and maintenance
  - API testing (REST/GraphQL) with Postman, RestAssured, or pytest
  - UI automation with Selenium, Playwright, or Cypress
  - CI/CD integration of test suites (GitHub Actions, GitLab CI, Jenkins)
  - Test case design: boundary analysis, equivalence partitioning, exploratory testing
  - Performance and load testing (JMeter, k6, Locust)
  - Bug lifecycle management and defect triage

