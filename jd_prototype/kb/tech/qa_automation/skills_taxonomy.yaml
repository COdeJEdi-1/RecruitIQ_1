    - Playwright (TypeScript or Python)
    - Selenium WebDriver (Java or Python)
    - Cypress
    - Appium (mobile)
  api_tools:
    - Postman / Newman
    - RestAssured (Java)
    - pytest + requests (Python)
  performance:
    - k6
    - JMeter
    - Locust
  languages:
    - Python
    - Java
    - TypeScript / JavaScript
  ci_cd:
    - GitHub Actions, GitLab CI
    - Jenkins
    - Docker (containerised test execution)

