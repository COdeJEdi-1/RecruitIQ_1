role_family: DevOps / Platform Engineering
department: Tech

core_skills:
  - Infrastructure-as-code (Terraform, Pulumi, or CloudFormation)
  - Container orchestration with Kubernetes (EKS, GKE, AKS, or self-managed)
  - CI/CD pipeline design and maintenance (GitHub Actions, GitLab CI, Jenkins, ArgoCD)
  - Cloud platform administration (AWS, GCP, or Azure — depth in at least one)
  - Observability stack: metrics (Prometheus/Grafana), logging (ELK/Loki), tracing (Jaeger/Tempo)
  - Incident management, post-mortem culture, and on-call participation
  - Security fundamentals: secrets management (Vault), IAM policies, network policies

stack_skills:
  cloud:
    - AWS (EC2, EKS, RDS, S3, Lambda, VPC, IAM)
    - GCP (GKE, Cloud Run, BigQuery, IAM)
    - Azure (AKS, Azure DevOps, App Service)
  containers:
    - Docker, Kubernetes, Helm
    - ArgoCD / Flux (GitOps)
  iac:
    - Terraform, Terragrunt
    - Ansible
    - Pulumi
  observability:
    - Prometheus, Grafana, Alertmanager
    - ELK / OpenSearch
    - Datadog, New Relic
  scripting:
    - Bash, Python (automation scripts)
    - Go (platform tooling preferred)

yoe_bands:
  junior: "1-3"
  mid: "3-6"
  senior: "6-10"
  staff: "10-15"
  principal: "15+"
