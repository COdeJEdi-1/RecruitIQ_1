{# Red Next Steps banner — shared UI + exports #}
<div class="jd-next-steps-footer" role="note" aria-label="Next steps for candidates">
  <div class="jd-next-steps-footer__main">

    <div class="jd-next-steps-footer__icon" aria-hidden="true">
      <span class="material-symbols-outlined">record_voice_over</span>
    </div>
    <div>
      <p class="jd-next-steps-footer__title">{{ jd_footer_heading }}</p>
      <p class="jd-next-steps-footer__text">{{ jd_footer_text }}</p>
    </div>
  </div>
  <div class="jd-next-steps-footer__brand">
    <span class="jd-next-steps-footer__brand-label">{{ jd_footer_brand_label }}</span>
    <span class="jd-next-steps-footer__brand-name">{{ jd_footer_brand_name }}</span>
  </div>
</div>
