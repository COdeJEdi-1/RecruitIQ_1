    core_skills: []
    progressive_skills:
    - Manage end-to-end Record to Report (R2R) operations including journal processing, accruals and provisions,
      balance sheet reconciliations, fixed assets, intercompany accounting, and period-end close
    - Ensure timely and accurate posting of journals and completion of close activities in compliance
      with company policies, accounting standards, and defined SLAs
    - Own and review balance sheet account reconciliations, ensure timely clearing of reconciling items,
      escalate aged or unusual items
    - Drive month-end, quarter-end, and year-end close per the close calendar, monitor task completion
      and dependencies, ensure cut-off adherence
    - Prepare and review financial schedules, flux/variance analysis, and management reporting inputs,
      providing commentary on key movements
    - Manage fixed asset accounting, intercompany reconciliations, and resolution of mismatches with counterpart
      entities
    - Ensure compliance with applicable accounting standards (IFRS/Ind AS), Indian statutory requirements,
      and internal financial controls (including SOX, where applicable)
    - Adhere to SOPs, audit requirements, compliance standards, and internal controls; support statutory
      and internal audits with timely, audit-ready documentation
    - Coordinate with FP&A, treasury, tax, auditors, and business teams for smooth process execution
    - Monitor process accuracy, turnaround time, reconciliation aging, and other operational KPIs
    - Identify opportunities for standardization, automation, and process improvement
    - Work independently with minimal supervision in a fast-paced Shared Services environment; provide
      guidance to junior team members
    arvind_specific:
    - Shared Services environment within a leading Indian conglomerate (GCC)
    leadership_skills:
    - Provides guidance to junior team members
    qualifications:
    - Graduate in Commerce/Accounting (B.Com) or equivalent; semi-qualified CA/CMA or MBA (Finance) preferred
    - 10-15 years of relevant experience in Record to Report (R2R) / general accounting / month-end close
      operations
    - Strong understanding of the end-to-end R2R lifecycle and core accounting concepts
    - Mandatory hands-on experience working on SAP (FI module)
    - Understanding of Indian accounting practices and statutory compliance, including GST and TDS, and
      exposure to IFRS/Ind AS
    - Good working knowledge of MS Excel; exposure to reporting/analytics tools (e.g., Power BI) an added
      advantage
    - Experience working in Shared Services / GCC / large corporate environment preferred
